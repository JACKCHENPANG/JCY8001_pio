<script>
'use strict';
// ============== Modbus (内联自 miniprogram/utils/modbus.js) ==============
const SID=0x01;
function crc16(b,len){len=(len===undefined)?b.length:len;let c=0xFFFF;for(let i=0;i<len;i++){c^=b[i];for(let k=0;k<8;k++)c=(c&1)?((c>>1)^0xA001):(c>>1);}return c&0xFFFF;}
function withCrc(a){const c=crc16(a,a.length);return new Uint8Array(a.concat([c&0xFF,(c>>8)&0xFF]));}
function readHolding(r,n){return withCrc([SID,3,(r>>8)&0xFF,r&0xFF,(n>>8)&0xFF,n&0xFF]);}
function writeReg(r,v){return withCrc([SID,6,(r>>8)&0xFF,r&0xFF,(v>>8)&0xFF,v&0xFF]);}
function writeCoil(a,on){return withCrc([SID,5,(a>>8)&0xFF,a&0xFF,on?0xFF:0,0]);}
function parseRead(buf){if(!buf||buf.length<5)return{ok:false};if(buf[0]!==SID)return{ok:false};if(buf[1]&0x80)return{ok:false};const nb=buf[2];if(buf.length<3+nb+2)return{ok:false};if(crc16(buf,3+nb)!==(buf[3+nb]|(buf[3+nb+1]<<8)))return{ok:false};const regs=[];for(let i=0;i<nb;i+=2)regs.push((buf[3+i]<<8)|buf[3+i+1]);return{ok:true,regs};}
function regs64ToUOhm(regs,off){off=off||0;let v=0n;for(let i=0;i<4;i++)v=(v<<16n)|BigInt(regs[off+i]&0xFFFF);if(v>>63n)v-=(1n<<64n);return Number(v)/100000.0;}
const REG={TEMP:0x3300,VOLT:0x3340,STATUS:0x3380,CH_COUNT:0x3E00,FW_VER:0x3E02,SAMP_RES:0x40C0,ZM_GAIN:0x4280,AVG:0x4040,ZM_FAST:0x4340,ZM_MODE:0x4300,SWEEP_TABLE:0x4400,SWEEP_COUNT:0x43C0,SWEEP_STATE:0x3E40,SWEEP_DONE:0x3E41,SWEEP_RE:0x3400,SWEEP_IM:0x3500,SWEEP_FREQ:0x3640};
const COIL={SWEEP_TRIG:0x00C0};
const DEFAULT_CODES=[0x0B42,0x09A2,0x08C6,0x087A,0x0796,0x082E,0x073A,0x0812,0x0716,0x070E,0x0806,0x070A,0x0902,0x0706,0x0802,0x0702,0x0602,0x0502,0x0402,0x0302];
const _F=125000/(2**24);
function codeToHz(c){c&=0xFFFF;return (c&0xFF)*(2**((c>>8)&0xFF))*_F;}

// ============== 分析 (内联自 miniprogram/utils/analysis.js, 含 L补偿/Kasa圆/ECM) ==============
// EIS 分析 (微信小程序 / Node 通用纯 JS)
// 移植自 tools/eis_nyquist.py + tools/eis_ecm.py。
// 约定: re/im 单位 μΩ, im 已是 -Z'' (Z = re + j*(-im))。

'use strict';

// ── 夹具串联电感 L 拟合 (高频 Z''≈ωL, 最小二乘过原点) ──
function fitInductance(hz, re, im, hfmin) {
  hfmin = hfmin || 300;
  let num = 0, den = 0;
  const Li = [];
  for (let k = 0; k < hz.length; k++) {
    if (hz[k] < hfmin) continue;
    const w = 2 * Math.PI * hz[k];
    const zpp = -im[k] * 1e-6;          // Z'' in Ω
    num += zpp * w; den += w * w;
    Li.push(zpp / w);
  }
  if (Li.length < 2) return { L: null, cv: null, n: Li.length };
  const L = num / den;                  // H
  const mean = Li.reduce((a, b) => a + b, 0) / Li.length;
  const sd = Math.sqrt(Li.reduce((a, b) => a + (b - mean) * (b - mean), 0) / Li.length);
  return { L: L, L_nH: L * 1e9, cv: mean ? sd / mean : 0, n: Li.length };
}

// ── 高斯消元解 n×n ──
function solveLin(A, b) {
  const n = b.length;
  const M = A.map((row, i) => row.slice().concat([b[i]]));
  for (let c = 0; c < n; c++) {
    let p = c;
    for (let r = c + 1; r < n; r++) if (Math.abs(M[r][c]) > Math.abs(M[p][c])) p = r;
    if (Math.abs(M[p][c]) < 1e-15) return null;
    [M[c], M[p]] = [M[p], M[c]];
    for (let r = 0; r < n; r++) {
      if (r === c) continue;
      const f = M[r][c] / M[c][c];
      for (let k = c; k <= n; k++) M[r][k] -= f * M[c][k];
    }
  }
  return M.map((row, i) => row[n] / row[i]);
}

// ── 找实部最低点 (Z'min = 高频伪迹边界, 之上的点为互感伪迹) ──
function findArtifact(re) {
  let iMin = 0;
  for (let k = 1; k < re.length; k++) if (re[k] < re[iMin]) iMin = k;
  return iMin;                          // 列表按 HF->LF, [0,iMin) = 伪迹
}

// ── Rct 半圆 Kasa 圆拟合, 返回 Rs(左截距)/Rct(直径) ──
function semicircleFit(hz, re, imc, iMin) {
  const trusted = [];
  for (let k = iMin; k < re.length; k++) trusted.push(k);
  if (trusted.length < 4) return { Rs: re[iMin], Rct: null, circle: null };
  // Rct 弧峰 = 中频 imc 局部极大; 限定 hz>=5 避开低频 Warburg 上翘尖
  const cand = trusted.filter(k => hz[k] >= 5);
  const pool = cand.length ? cand : trusted;
  let peak = pool[0];
  for (const k of pool) if (imc[k] > imc[peak]) peak = k;
  // 峰后第一个谷 = Warburg 起点
  let we = re.length - 1;
  for (let k = peak; k < re.length - 1; k++) { if (imc[k + 1] > imc[k]) { we = k; break; } }
  const arc = [];
  for (let k = iMin; k <= we; k++) arc.push(k);
  if (arc.length < 4) return { Rs: re[iMin], Rct: null, circle: null };
  // Kasa: x²+y²+Dx+Ey+F=0
  let sxx = 0, sxy = 0, syy = 0, sx = 0, sy = 0, sxz = 0, syz = 0, sz = 0;
  const m = arc.length;
  for (const k of arc) {
    const x = re[k], y = imc[k], z = x * x + y * y;
    sxx += x * x; sxy += x * y; syy += y * y; sx += x; sy += y;
    sxz += x * z; syz += y * z; sz += z;
  }
  const sol = solveLin([[sxx, sxy, sx], [sxy, syy, sy], [sx, sy, m]], [-sxz, -syz, -sz]);
  if (!sol) return { Rs: re[iMin], Rct: null, circle: null };
  const [D, E, F] = sol;
  const disc = D * D - 4 * F;
  if (disc <= 0) return { Rs: re[iMin], Rct: null, circle: null };
  const r1 = (-D - Math.sqrt(disc)) / 2, r2 = (-D + Math.sqrt(disc)) / 2;
  const Rs = Math.min(r1, r2), Rsum = Math.max(r1, r2);
  const xc = -D / 2, yc = -E / 2;
  return { Rs: Rs, Rct: Rsum - Rs, circle: { xc: xc, yc: yc, R: Math.sqrt(xc * xc + yc * yc - F) } };
}

// ── 完整分析: L + 补偿 + 伪迹 + Rs/Rct ──
function analyze(hz, re, im, opts) {
  opts = opts || {};
  const out = { L_nH: null, cv: null, imc: im.slice(), artifact: [], Rs: null, Rct: null, circle: null };
  if (hz.length < 4) return out;
  const f = fitInductance(hz, re, im, opts.hfmin);
  if (f.L == null) return out;
  // L≤0 = 高频无感性尾(高内阻电芯, 电感可忽略) → 不补偿
  const L = f.L > 0 ? f.L : 0;
  out.L_nH = f.L > 0 ? f.L_nH : 0; out.cv = f.L > 0 ? f.cv : null;
  const imc = hz.map((h, k) => im[k] + 2 * Math.PI * h * L * 1e6);
  out.imc = imc;
  const iMin = findArtifact(re);
  for (let k = 0; k < iMin; k++) out.artifact.push(k);
  const sc = semicircleFit(hz, re, imc, iMin);
  out.Rs = sc.Rs; out.Rct = sc.Rct; out.circle = sc.circle;
  return out;
}

// ── 复数辅助 ──
function cAdd(a, b) { return [a[0] + b[0], a[1] + b[1]]; }
function cMul(a, b) { return [a[0] * b[0] - a[1] * b[1], a[0] * b[1] + a[1] * b[0]]; }
function cInv(a) { const d = a[0] * a[0] + a[1] * a[1]; return [a[0] / d, -a[1] / d]; }
// (jω)^n = ω^n (cos(nπ/2) + j sin(nπ/2))
function jwPow(w, n) { const m = Math.pow(w, n), t = n * Math.PI / 2; return [m * Math.cos(t), m * Math.sin(t)]; }

// ECM 模型 Z(ω) = jωL + Rs + [CPE ‖ (Rct + Zw)]   (SI: Ω,H,F)
function ecmModel(p, w) {
  const L = p[0], Rs = p[1], Rct = p[2], Q = p[3], n = p[4], sig = p[5];
  const jwn = jwPow(w, n);                          // (jω)^n
  const Ycpe = [Q * jwn[0], Q * jwn[1]];            // Y_CPE = Q(jω)^n
  const jwm = jwPow(w, -0.5);
  const Zw = [sig * jwm[0], sig * jwm[1]];          // Warburg
  const Zrw = [Rct + Zw[0], Zw[1]];
  const Yp = cAdd(Ycpe, cInv(Zrw));                 // CPE ‖ (Rct+Zw) 的导纳
  const Zp = cInv(Yp);
  return cAdd([Rs, w * L], Zp);                     // jωL 的实部 0, 虚部 ωL
}

// ── ECM 拟合: Levenberg-Marquardt, 相对残差, 剔高频伪迹后拟合 ──
function ecmFit(hz, re, im) {
  const iMin = findArtifact(re);
  const idx = [];
  for (let k = iMin; k < hz.length; k++) idx.push(k);
  if (idx.length < 6) return null;
  const w = idx.map(k => 2 * Math.PI * hz[k]);
  const Zr = idx.map(k => re[k] * 1e-6);            // Ω
  const Zi = idx.map(k => -im[k] * 1e-6);           // Z'' = -im
  const mag = idx.map((_, j) => Math.hypot(Zr[j], Zi[j]) || 1e-12);

  function residuals(p) {
    const r = [];
    for (let j = 0; j < w.length; j++) {
      const Zm = ecmModel(p, w[j]);
      r.push((Zm[0] - Zr[j]) / mag[j]);
      r.push((Zm[1] - Zi[j]) / mag[j]);
    }
    return r;
  }
  function cost(r) { return r.reduce((a, b) => a + b * b, 0); }

  // 初值 + 边界
  // 上界按电芯量级自适应 (亚mΩ 低阻 ~ 几十mΩ 高阻三元都覆盖)
  const Rmax = Math.max(re[re.length - 1] * 1e-6 * 5, 1e-2);
  const Rs0 = Math.min(re[iMin] * 1e-6, Rmax * 0.9);
  const Rct0 = Math.min(Math.max((re[re.length - 1] - re[iMin]) * 1e-6 * 0.8, 1e-5), Rmax * 0.9);
  let p = [2e-7, Rs0, Rct0, 10.0, 0.85, 5e-5];
  const lb = [1e-9, 1e-6, 1e-6, 1e-6, 0.3, 0.0];
  const ub = [1e-6, Rmax, Rmax, 1e6, 1.0, 1e0];
  const clamp = q => q.map((v, i) => Math.min(Math.max(v, lb[i]), ub[i]));
  p = clamp(p);

  let lambda = 1e-3;
  let r = residuals(p), c = cost(r);
  const N = p.length;
  for (let iter = 0; iter < 120; iter++) {
    // 数值 Jacobian
    const J = r.map(() => new Array(N).fill(0));
    for (let i = 0; i < N; i++) {
      const dp = Math.max(Math.abs(p[i]) * 1e-6, 1e-12);
      const pp = p.slice(); pp[i] += dp;
      const rp = residuals(pp);
      for (let k = 0; k < r.length; k++) J[k][i] = (rp[k] - r[k]) / dp;
    }
    // JtJ, Jtr
    const JtJ = Array.from({ length: N }, () => new Array(N).fill(0));
    const Jtr = new Array(N).fill(0);
    for (let k = 0; k < r.length; k++) {
      for (let i = 0; i < N; i++) {
        Jtr[i] += J[k][i] * r[k];
        for (let j = 0; j < N; j++) JtJ[i][j] += J[k][i] * J[k][j];
      }
    }
    let improved = false;
    for (let tryi = 0; tryi < 8; tryi++) {
      const A = JtJ.map((row, i) => row.map((v, j) => (i === j ? v * (1 + lambda) : v)));
      const dp = solveLin(A, Jtr.map(v => -v));
      if (!dp) { lambda *= 10; continue; }
      const pn = clamp(p.map((v, i) => v + dp[i]));
      const rn = residuals(pn), cn = cost(rn);
      if (cn < c) { p = pn; r = rn; c = cn; lambda = Math.max(lambda / 3, 1e-9); improved = true; break; }
      lambda *= 10;
    }
    if (!improved && lambda > 1e7) break;
  }
  const rms = Math.sqrt(2 * c / r.length) * 100;   // 每点复数 (r.length=2N), 与 PC 工具同口径
  const [L, Rs, Rct, Q, n, sig] = p;
  const Cdl = Math.pow(Q * Math.pow(1 / Rs + 1 / Rct, n - 1), 1 / n);
  return {
    L: L, L_nH: L * 1e9, Rs: Rs, Rs_uOhm: Rs * 1e6, Rct: Rct, Rct_uOhm: Rct * 1e6,
    Q: Q, n: n, sig: sig, Cdl: Cdl, rms: rms, iMin: iMin
  };
}

// ── 整包一致性: 以 Rct 为主, 算中位数+偏差, 标超差 ──
function consistency(rcts, tolPct) {
  const sorted = rcts.slice().sort((a, b) => a - b);
  const med = sorted.length ? sorted[Math.floor(sorted.length / 2)] : 0;
  const dev = rcts.map(v => (med ? (v - med) / med * 100 : 0));
  const bad = [];
  dev.forEach((d, i) => { if (Math.abs(d) > tolPct) bad.push({ i: i, dev: d }); });
  return { median: med, dev: dev, bad: bad };
}

const API = { fitInductance, analyze, semicircleFit, ecmFit, ecmModel, consistency, findArtifact };
if (typeof module !== 'undefined' && module.exports) module.exports = API;   // Node 测试
// 小程序: const A = require('../../utils/analysis.js')

const A = API;

// ============== Web Bluetooth 传输层 (替 wx.* ble.js) ==============
const SVC=0xffe0, CHR=0xffe1;
let gChar=null, rxBuf=[];
function onNotify(e){const dv=e.target.value;for(let i=0;i<dv.byteLength;i++)rxBuf.push(dv.getUint8(i));}
async function bleConnect(){
  const dev=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'JDY'}],optionalServices:[SVC]});
  const srv=await dev.gatt.connect();
  const s=await srv.getPrimaryService(SVC);
  gChar=await s.getCharacteristic(CHR);
  await gChar.startNotifications();
  gChar.addEventListener('characteristicvaluechanged',onNotify);
  dev.addEventListener('gattserverdisconnected',()=>{gChar=null;setStatus('已断开',false);});
  return dev;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function txn(frame,respLen,timeout){
  timeout=timeout||3000;
  for(let attempt=0;attempt<2;attempt++){
    rxBuf=[];
    await gChar.writeValueWithoutResponse(frame.buffer?frame:new Uint8Array(frame));
    const t0=Date.now();
    while(rxBuf.length<respLen && Date.now()-t0<timeout) await sleep(40);
    if(rxBuf.length>=respLen) return new Uint8Array(rxBuf);
    await sleep(150);
  }
  return new Uint8Array(rxBuf);
}
async function rd(reg,cnt){const r=await txn(readHolding(reg,cnt),5+2*cnt);const p=parseRead(r);if(!p.ok)throw new Error('read 0x'+reg.toString(16));return p.regs;}
async function rdI64(reg){const regs=await rd(reg,4);return regs64ToUOhm(regs,0);}
async function w06(reg,val){await txn(writeReg(reg,val),8);}
async function coil(a,on){await txn(writeCoil(a,on),8);}

const API_BASE='/battery-api';   // 同域反代; GitHub Pages 上无此接口(仅演示)
const API_TOKEN='jcy8001-prod-7f3a2c9b5e';
let gTemp=null,gVolt=null,gLast=null,gPhoto=null;
async function apiPost(path,body){
  const r=await fetch(API_BASE+path,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_TOKEN},body:JSON.stringify(body)});
  return r.json();
}
async function apiGet(path){
  const r=await fetch(API_BASE+path,{headers:{'Authorization':'Bearer '+API_TOKEN}});
  return r.json();
}
// ============== UI ==============
const $=id=>document.getElementById(id);
function setStatus(t,ok){$('st').textContent=t;$('st').className='val '+(ok?'ok':'');}
$('btnConn').onclick=async()=>{
  try{
    setStatus('连接中...',false);
    await bleConnect();
    setStatus('已连接 (BLE)',true);
    const fw=(await rd(REG.FW_VER,1))[0];
    $('fw').textContent='v'+((fw>>8)&0xFF).toString(16)+'.'+String(fw&0xFF).padStart(2,'0');
    gTemp=(await rd(REG.TEMP,1))[0]/10; $('tp').textContent=gTemp.toFixed(1)+' °C';
    gVolt=(await rd(REG.VOLT,1))[0]/10000; $('vt').textContent=gVolt.toFixed(4)+' V';
    $('btnSweep').disabled=false; $('btnConn').textContent='已连接';
  }catch(e){setStatus('连接失败: '+e.message,false);}
};
$('btnSweep').onclick=async()=>{
  const N=parseInt($('mode').value); $('btnSweep').disabled=true; $('ecm').textContent='';
  try{
    const sel=$('range').value; localStorage.setItem('jcy_range',sel);
    if(sel==='auto'){ await w06(REG.AUTORANGE,1); }            // 固件自动挡: 扫前自己探点定档
    else { await w06(REG.AUTORANGE,0); await w06(REG.SAMP_RES,parseInt(sel)); }
    await w06(REG.ZM_GAIN,1); await w06(REG.AVG,4);
    await w06(REG.ZM_FAST,0); await w06(REG.ZM_MODE,0);
    for(let i=0;i<N;i++) await w06(REG.SWEEP_TABLE+i,DEFAULT_CODES[i]); // 逐寄存器写避BLE分帧
    await w06(REG.SWEEP_COUNT,N);
    await coil(COIL.SWEEP_TRIG,true);
    const hz=[],re=[],im=[]; let done=0,fails=0; const t0=Date.now();
    async function grab(i){const rr=await rdI64(REG.SWEEP_RE+i*4),ii=await rdI64(REG.SWEEP_IM+i*4);const cd=(await rd(REG.SWEEP_FREQ+i,1))[0];const f=cd?codeToHz(cd):codeToHz(DEFAULT_CODES[i]);hz.push(f);re.push(rr);im.push(ii);}
    while(Date.now()-t0<320000){
      try{
        const comp=Math.min((await rd(REG.SWEEP_DONE,1))[0],N);
        while(done<comp){await grab(done);done++;$('prog').textContent=done+' / '+N;draw(hz,re,im);}
        const st=(await rd(REG.SWEEP_STATE,1))[0]; fails=0;
        if(st===2){const c2=Math.min((await rd(REG.SWEEP_DONE,1))[0],N);while(done<c2){await grab(done);done++;}break;}
        if(st===3){$('prog').textContent='设备中止';break;}
      }catch(e){fails++;await sleep(600);if(fails>40)break;continue;}
      await sleep(400);
    }
    try{await coil(COIL.SWEEP_TRIG,false);}catch(e){}
    finishAnalyze(hz,re,im);
  }catch(e){$('ecm').textContent='扫频出错: '+e.message;}
  $('btnSweep').disabled=false;
};
function finishAnalyze(hz,re,im){
  // 剔掉掉点(re<=0)再分析
  const H=[],R=[],I=[];for(let k=0;k<hz.length;k++)if(re[k]>0){H.push(hz[k]);R.push(re[k]);I.push(im[k]);}
  if(H.length<4){$('prog').textContent='有效点不足 '+H.length;return;}
  const o=A.analyze(H,R,I); const ecm=A.ecmFit(H,R,I);
  $('L').textContent=o.L_nH!=null?o.L_nH.toFixed(0)+' nH':'—';
  $('rs').textContent=o.Rs!=null?(o.Rs/1000).toFixed(3)+' mΩ':'—';
  $('rct').textContent=o.Rct!=null?(o.Rct/1000).toFixed(3)+' mΩ':'—';
  if(ecm)$('ecm').textContent='ECM: Rs='+(ecm.Rs_uOhm/1000).toFixed(3)+' Rct='+(ecm.Rct_uOhm/1000).toFixed(3)+' mΩ · n='+ecm.n.toFixed(2)+' · RMS '+ecm.rms.toFixed(2)+'%';
  draw(H,R,I,o);
  $('prog').textContent='完成 ('+H.length+'点)';
  gLast={hz:H,re:R,im:I,o:o,ecm:ecm};
  saveRecord();
}
async function saveRecord(){
  if(!gLast){return;}
  const phone=($('phone').value||'').trim(), bcode=($('bcode').value||'').trim();
  if(!/^\d{11}$/.test(phone)){$('saveSt').textContent='⚠ 手机号需11位数字, 未保存';$('phone').style.borderBottom='1px solid #ff3b30';return;}
  $('phone').style.borderBottom='1px solid #ddd';
  if(!bcode){$('saveSt').textContent='⚠ 未填电池码, 未保存';$('bcode').style.borderBottom='1px solid #ff3b30';return;}
  $('bcode').style.borderBottom='1px solid #ddd';
  $('saveSt').textContent='保存中...';
  try{
    const o=gLast.o, ecm=gLast.ecm;
    const body={user_phone:phone,battery_code:bcode,
      spectrum:{hz:gLast.hz,re:gLast.re,im:gLast.im},
      rs:o.Rs,rct:o.Rct,l_nh:o.L_nH,
      ecm:ecm?{rs:ecm.Rs_uOhm,rct:ecm.Rct_uOhm,n:ecm.n,rms:ecm.rms}:null,
      temp:gTemp,volt:gVolt,device_id:'JDY-10',photo:gPhoto,measured_at:new Date().toISOString()};
    const r=await apiPost('/save',body);
    if(r.ok){$('saveSt').textContent='已存 #'+r.id+(gPhoto?' 📷':'');clearPhoto();}
    else $('saveSt').textContent='存失败: '+(r.err||'?');
  }catch(e){$('saveSt').textContent='存失败(离线?): '+e.message;}
}
async function loadHistory(){
  const phone=($('phone').value||'').trim(), bcode=($('bcode').value||'').trim();
  let q='/list?limit=50'; if(phone)q+='&phone='+encodeURIComponent(phone); if(bcode)q+='&code='+encodeURIComponent(bcode);
  $('histBox').textContent='查询中...';
  try{
    const r=await apiGet(q);
    if(!r.ok){$('histBox').textContent='查询失败';return;}
    if(!r.rows.length){$('histBox').textContent='无记录';return;}
    let h='<table style="width:100%;border-collapse:collapse"><tr style="color:#8e8e93"><td>电池码</td><td>Rs</td><td>Rct</td><td>时间</td><td>图</td></tr>';
    for(const x of r.rows){const pic=x.photo_path?'<a href="/battery-photos/'+x.photo_path+'" target="_blank">📷</a>':'';
      h+='<tr><td>'+x.battery_code+'</td><td>'+(x.rs!=null?(x.rs/1000).toFixed(3):'-')+'</td><td>'+(x.rct!=null?(x.rct/1000).toFixed(3):'-')+'</td><td style="color:#8e8e93">'+(x.measured_at||'').replace('T',' ').slice(5,16)+'</td><td>'+pic+'</td></tr>';}
    $('histBox').innerHTML=h+'</table>';
  }catch(e){$('histBox').textContent='查询失败(离线?): '+e.message;}
}
function draw(hz,re,im,o){
  const c=$('nyq'),x=c.getContext('2d'),W=c.width,Hh=c.height,Lm=46,B=28,Rm=12,T=14;
  let imc=o?o.imc:im.map((v,k)=>v); // 未分析时直接画原始(含感性尾)
  const xs=re.map(v=>v/1000),ys=imc.map(v=>v/1000);
  let xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(0,...ys),ymax=Math.max(...ys);
  const px=(xmax-xmin)*0.1+1e-6,py=(ymax-ymin)*0.15+1e-6;xmin-=px;xmax+=px;ymin-=py;ymax+=py;
  const X=v=>Lm+(v-xmin)/(xmax-xmin)*(W-Lm-Rm),Y=v=>Hh-B-(v-ymin)/(ymax-ymin)*(Hh-B-T);
  x.fillStyle='#fff';x.fillRect(0,0,W,Hh);
  x.strokeStyle='#ddd';x.beginPath();x.moveTo(Lm,T);x.lineTo(Lm,Hh-B);x.lineTo(W-Rm,Hh-B);x.stroke();
  x.strokeStyle='#eee';x.beginPath();x.moveTo(Lm,Y(0));x.lineTo(W-Rm,Y(0));x.stroke();
  x.fillStyle='#8e8e93';x.font='10px sans-serif';x.fillText("Z' mΩ",W-46,Hh-9);
  x.save();x.translate(12,Hh/2);x.rotate(-Math.PI/2);x.fillText("-Z'' mΩ",0,0);x.restore();
  if(o&&o.circle){const cc=o.circle;x.strokeStyle='#ff3b30';x.setLineDash([4,3]);x.beginPath();for(let a=0;a<=2*Math.PI;a+=0.05){const cx=(cc.xc+cc.R*Math.cos(a))/1000,cy=(cc.yc+cc.R*Math.sin(a))/1000;a?x.lineTo(X(cx),Y(cy)):x.moveTo(X(cx),Y(cy));}x.stroke();x.setLineDash([]);}
  x.strokeStyle='#0071e3';x.lineWidth=2;x.beginPath();xs.forEach((v,i)=>i?x.lineTo(X(v),Y(ys[i])):x.moveTo(X(v),Y(ys[i])));x.stroke();
  x.fillStyle='#0071e3';xs.forEach((v,i)=>{x.beginPath();x.arc(X(v),Y(ys[i]),3,0,7);x.fill();});
}

// 拍照 -> 压缩成 jpeg base64
function clearPhoto(){gPhoto=null;$('photoRow').style.display='none';$('btnClrPhoto').style.display='none';$('photo').value='';}
$('photo').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  const img=new Image(); const url=URL.createObjectURL(f);
  img.onload=()=>{
    URL.revokeObjectURL(url);
    let w=img.width,hh=img.height; const MAX=1000;
    if(w>MAX||hh>MAX){const s=MAX/Math.max(w,hh);w=Math.round(w*s);hh=Math.round(hh*s);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=hh;
    cv.getContext('2d').drawImage(img,0,0,w,hh);
    gPhoto=cv.toDataURL('image/jpeg',0.7);
    $('thumb').src=gPhoto;$('photoRow').style.display='flex';$('btnClrPhoto').style.display='inline-block';
  };
  img.src=url;
});
$('btnClrPhoto').onclick=clearPhoto;

// 扫码 -> 填电池码 (BarcodeDetector, 安卓Chrome原生)
let scanStream=null,scanRun=false;
$('btnScan').onclick=async()=>{
  if(!('BarcodeDetector' in window)){alert('此浏览器不支持扫码(用新版安卓Chrome), 请手动输入电池码');return;}
  try{
    const det=new BarcodeDetector();
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=$('scanVid'); v.srcObject=scanStream; await v.play();
    $('scanModal').style.display='flex'; scanRun=true;
    const loop=async()=>{
      if(!scanRun)return;
      try{const codes=await det.detect(v); if(codes&&codes.length){const val=codes[0].rawValue;$('bcode').value=val;localStorage.setItem('jcy_bcode',val);stopScan();return;}}catch(e){}
      requestAnimationFrame(loop);
    };
    loop();
  }catch(e){alert('打不开摄像头: '+e.message);stopScan();}
};
function stopScan(){scanRun=false;$('scanModal').style.display='none';if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}}
$('scanCancel').onclick=stopScan;

if(!navigator.bluetooth){document.querySelector('.nav').textContent='此浏览器不支持 Web 蓝牙(用安卓 Chrome)';}
